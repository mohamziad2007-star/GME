 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات</title>
    <link rel="stylesheet" href="../css/kitchen.css">
    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
        rel="stylesheet">
</head>
<body>


    <div class="cart-container">
        <h2>مشترياتك الحالية</h2>
        <table class="cart-table">
            <thead>
                <tr>
                    <th>المنتج</th>
                    <th>السعر</th>
                    <th>الكمية</th>
                    <th>الإجمالي</th>
                </tr>
            </thead>
            <tbody id="cart-body">
                </tbody>
        </table>

        <div class="cart-total">
            الإجمالي النهائي: <span id="total-price">0 EGP</span>
        </div>

        <button class="checkout-btn" onclick="alert('شكراً لثقتك! تم تنفيذ طلبك بنجاح'); clearCart();">إتمام الشراء (Finish) ✅</button>
    </div>

<script src="../js/kitchen.js"></script>
<script src="../js/kitchen-2.js"></script>
</body>
</html>
